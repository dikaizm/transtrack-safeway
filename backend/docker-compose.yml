name: transtrack_rdd

services:
  api:
    container_name: transtrack-rdd-api
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5434/transtrack
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./:/app
      - temp_videos:/tmp/transtrack/videos
      - ../models:/app/models:ro
    depends_on:
      - postgres
      - redis

  worker:
    container_name: transtrack-rdd-worker
    build: .
    command: celery -A app.core.celery.celery_app worker --loglevel=info --concurrency=1
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5434/transtrack
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./:/app
      - temp_videos:/tmp/transtrack/videos
      - ../models:/app/models:ro
    depends_on:
      - postgres
      - redis

  postgres:
    container_name: transtrack-rdd-postgres
    image: postgres:16-alpine
    command: postgres -p 5434
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transtrack
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    container_name: transtrack-rdd-redis
    image: redis:7-alpine

volumes:
  postgres_data:
  temp_videos:
