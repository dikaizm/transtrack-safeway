defaults:
  - base

model:
  type: "rfdetr"
  task: "detect"
  # Apache 2.0 licensed — Roboflow RF-DETR
  size: "base"      # "base" (~29M params) or "large" (~128M params)
  # base  — fastest, comparable to YOLOv8m
  # large — highest accuracy, slower

train:
  epochs: 100
  batch: 8
  imgsz: 640
  lr: 0.0001
  weight_decay: 0.0001
  warmup_steps: 500
  patience: 20
  gradient_clip: 0.1
  workers: 4
  device: "cuda"
  output_dir: "runs/rfdetr"
