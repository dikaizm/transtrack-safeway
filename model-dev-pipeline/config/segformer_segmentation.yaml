defaults:
  - base

# Roboflow: stelar/rdd-mining-road-seg v1
# Download: python scripts/download_datasets.py --api-key <key> --dataset seg
data:
  train: "data/segmentation/train"
  val:   "data/segmentation/val"
  test:
    all:   "data/segmentation/test"
    day:   "data/segmentation/test/day"
    wet:   "data/segmentation/test/wet"
    night: "data/segmentation/test/night"
  classes:
    - drive_area
    - off_road
  nc: 2

model:
  type: "segformer"
  task: "segment"
  checkpoint: "nvidia/mit-b0"   # Apache 2.0 — Mix Transformer encoder, lightest variant

train:
  epochs: 100
  batch: 8
  imgsz: 640
  lr: 6e-4             # decode head learning rate
  lr_backbone: 6e-5    # encoder learning rate (10x lower — pretrained)
  weight_decay: 0.01
  gradient_clip: 1.0
  patience: 20
  workers: 4
  output_dir: "runs/segformer"

augmentation:
  fliplr: 0.5          # horizontal flip probability
