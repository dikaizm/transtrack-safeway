defaults:
  - base

data:
  train: "data/detection/train"
  val:   "data/detection/val"
  test:
    all:   "data/detection/test"
    day:   "data/detection/test/day"
    wet:   "data/detection/test/wet"
    night: "data/detection/test/night"

model:
  type: "rtdetr"
  task: "detect"
  # Apache 2.0 licensed — HuggingFace Hub checkpoint
  checkpoint: "PekingU/rtdetr_r50vd"   # RT-DETR ResNet-50 backbone
  # Options:
  #   PekingU/rtdetr_r18vd  — lightest (~20M params)
  #   PekingU/rtdetr_r50vd  — balanced (~42M params)
  #   PekingU/rtdetr_r101vd — heaviest, highest accuracy

train:
  epochs: 100
  batch: 8          # transformer models need more memory per sample
  imgsz: 640
  lr: 0.0001        # transformers use lower LR than YOLO
  lr_backbone: 0.00001
  weight_decay: 0.0001
  warmup_steps: 500
  patience: 20
  gradient_clip: 0.1
  workers: 4
  device: "cuda"    # "cpu" for CPU
  output_dir: "runs/rtdetr"

augmentation:
  # Applied via albumentations in the dataset class
  horizontal_flip: 0.5
  color_jitter:
    brightness: 0.4
    contrast: 0.4
    saturation: 0.4
    hue: 0.1
  random_scale:
    min: 0.5
    max: 1.5
  blur_limit: 3
