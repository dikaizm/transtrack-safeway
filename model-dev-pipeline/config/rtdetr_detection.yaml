defaults:
  - base

# Roboflow: stelar/rdd-mining-road-det v5
# Download: python scripts/download_datasets.py --api-key <key> --dataset det
data:
  train: "data/detection/train"
  val:   "data/detection/val"
  test:
    all:   "data/detection/test"
    day:   "data/detection/test/day"
    wet:   "data/detection/test/wet"
    night: "data/detection/test/night"

model:
  type: "rtdetr"
  task: "detect"
  weights: "rtdetr-l.pt"   # Ultralytics RT-DETR large (COCO-pretrained)
  # Options:
  #   rtdetr-l.pt — large (~32M params, good balance)
  #   rtdetr-x.pt — extra large (~67M params, highest accuracy)

train:
  epochs: 100
  batch: 8
  imgsz: 640
  lr0: 0.0001             # AdamW initial lr (RT-DETR default)
  lrf: 0.01               # final lr = lr0 * lrf
  weight_decay: 0.0001
  warmup_epochs: 3
  patience: 20
  save_period: 10
  workers: 4
  device: 0               # GPU device id, "cpu" for CPU
  output_dir: "runs/rtdetr"

augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  translate: 0.1
  scale: 0.5
  fliplr: 0.5
  mosaic: 0.0             # RT-DETR: mosaic off by default
