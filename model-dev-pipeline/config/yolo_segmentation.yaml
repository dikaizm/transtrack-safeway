defaults:
  - base

# Roboflow: stelar/rdd-mining-road-seg v1
# Download: python scripts/download_datasets.py --api-key <key> --dataset seg
data:
  train: "data/segmentation/train"
  val:   "data/segmentation/val"
  test:
    all:   "data/segmentation/test"
    day:   "data/segmentation/test/day"
    wet:   "data/segmentation/test/wet"
    night: "data/segmentation/test/night"
  classes:
    - drive_area
    - off_road
  nc: 2

model:
  type: "yolo"
  task: "segment"
  weights: "yolov8n-seg.pt"   # nano — 2-class task, doesn't need large model

train:
  epochs: 100
  batch: 16
  imgsz: 640
  lr0: 0.01
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  patience: 20
  save_period: 10
  workers: 8
  device: 0

augmentation:
  hsv_h: 0.015
  hsv_s: 0.5
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  fliplr: 0.5
  mosaic: 1.0
  blur: 0.01
