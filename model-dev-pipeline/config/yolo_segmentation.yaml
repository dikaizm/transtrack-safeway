defaults:
  - base

model:
  type: "yolo"
  task: "segment"
  weights: "yolov8n-seg.pt"   # nano — binary task, doesn't need large model

train:
  epochs: 100
  batch: 16
  imgsz: 640
  lr0: 0.01
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  patience: 20
  save_period: 10
  workers: 8
  device: 0

augmentation:
  hsv_h: 0.015
  hsv_s: 0.5
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  fliplr: 0.5
  mosaic: 1.0
  blur: 0.01
